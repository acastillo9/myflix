# MyFlix — Docker Compose Override with Traefik Reverse Proxy
#
# This file extends docker-compose.yml with Traefik reverse proxy for HTTPS.
# It's loaded automatically by docker compose when present — the Traefik labels
# below are harmless when Traefik is not running (containers simply ignore them).
#
# To enable HTTPS:
#   1. Update DOMAIN and TRAEFIK_ACME_EMAIL in .env
#   2. Ensure ports 80 and 443 are open on your server
#   3. Start with the traefik profile:
#        docker compose --profile traefik up -d
#        docker compose --profile full --profile traefik up -d   # Phase 1
#
# Services will be available at:
#   https://jellyfin.yourdomain.com
#   https://seerr.yourdomain.com
#   https://radarr.yourdomain.com
#   etc.

services:
  # ===========================================================================
  # REVERSE PROXY
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    profiles:
      - traefik
    command:
      # API and Dashboard (served via HTTPS only — do not enable insecure in production)
      - --api.dashboard=true
      - --api.insecure=false

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=myflix

      # Let's Encrypt
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json

      # Logging
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}/letsencrypt:/letsencrypt
    networks:
      - myflix
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # MEDIA SERVER
  # ===========================================================================
  jellyfin:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.http.routers.jellyfin-http.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin-http.entrypoints=web"
      - "traefik.http.middlewares.jellyfin-https.redirectscheme.scheme=https"
      - "traefik.http.routers.jellyfin-http.middlewares=jellyfin-https"

  # ===========================================================================
  # REQUEST UI
  # ===========================================================================
  seerr:
